name: Build Olympic Analyzer

on:
  push:
    branches: [ main ]      # запускать при каждом push в main
  workflow_dispatch:          # или вручную из интерфейса GitHub

jobs:
  build-windows:
    runs-on: windows-latest   # используем Windows машину GitHub

    steps:
      # 1. Скачиваем твой код
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Устанавливаем Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. Кэшируем Rust зависимости (чтобы не качать каждый раз)
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            frontend/src-tauri -> target
            backend -> target

      # 4. Устанавливаем Node.js
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 5. Компилируем Rust бэкенд
      - name: Build backend
        working-directory: backend
        run: cargo build --release
        # Результат: backend/target/release/backend.exe

      # 6. Копируем бэкенд в папку Tauri
      # Имя файла ВАЖНО — Tauri требует суффикс платформы
      - name: Copy backend to Tauri binaries
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          cp backend/target/release/backend.exe \
             frontend/src-tauri/binaries/backend-x86_64-pc-windows-msvc.exe

      # 7. Устанавливаем npm зависимости фронта
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # 8. Собираем Tauri приложение
      # Это создаст .exe установщик
      - name: Build Tauri app
        working-directory: frontend
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      # 9. Сохраняем готовый .exe как артефакт
      # Его можно скачать из интерфейса GitHub
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: olympic-analyzer-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
